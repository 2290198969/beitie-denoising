# DnCNN 训练配置
# 和 U-Net 保持相同条件（公平对比）：同数据集、同 epoch 数、同 loss、同学习率

data:
  train_dir: "data/raw"
  test_dir: "data/test"
  patch_size: 128
  noise_level: "random"
  num_workers: 4

model:
  name: "dncnn"
  in_channels: 1
  out_channels: 1
  num_layers: 17       # 原论文标准
  num_features: 64     # 原论文标准
  residual: true       # 残差学习（学噪声）

train:
  epochs: 100          # 和 U-Net 一样 100 epoch
  batch_size: 16       # DnCNN 参数少，可以开更大 batch
  lr: 0.001
  lr_scheduler: "cosine"
  weight_decay: 0.0001
  save_every: 10
  log_every: 50

output:
  checkpoint_dir: "checkpoints"
