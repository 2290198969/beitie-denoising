# DnCNN 冒烟测试配置（本机跑2个epoch看能不能通）

data:
  train_dir: "data/raw"
  test_dir: "data/test"
  patch_size: 128
  noise_level: "random"
  num_workers: 0       # Windows 下避免多进程问题

model:
  name: "dncnn"
  in_channels: 1
  out_channels: 1
  num_layers: 17
  num_features: 64
  residual: true

train:
  epochs: 2
  batch_size: 4
  lr: 0.001
  lr_scheduler: "cosine"
  weight_decay: 0.0001
  save_every: 1
  log_every: 10

output:
  checkpoint_dir: "checkpoints"
