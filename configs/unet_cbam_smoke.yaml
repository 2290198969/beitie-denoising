# U-Net + CBAM 冒烟测试（本机 2 epoch 看能否跑通）

data:
  train_dir: "data/raw"
  test_dir: "data/test"
  patch_size: 128
  noise_level: "random"
  num_workers: 0

model:
  name: "unet_cbam"
  in_channels: 1
  out_channels: 1
  base_ch: 32
  residual: true
  cbam_ratio: 16

train:
  epochs: 2
  batch_size: 4
  lr: 0.001
  lr_scheduler: "cosine"
  weight_decay: 0.0001
  save_every: 1
  log_every: 10

output:
  checkpoint_dir: "checkpoints"
