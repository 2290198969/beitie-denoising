# 碑帖去噪 - 默认配置
# 训练时通过 --config configs/default.yaml 加载

# --- 数据 ---
data:
  train_dir: "data/raw"          # 干净训练图所在文件夹
  test_dir: "data/test"          # 测试集（需要有 noisy/ 和 clean/ 子文件夹）
  patch_size: 128                # 训练时裁剪的 patch 大小
  noise_level: "random"          # light / medium / heavy / random
  num_workers: 4                 # DataLoader 并行加载进程数

# --- 模型 ---
model:
  name: "unet"                   # 模型名称
  in_channels: 1                 # 灰度=1, RGB=3
  out_channels: 1
  base_ch: 32                    # 首层通道数（越大模型越大、显存占用越高）
  residual: true                 # 残差学习（推荐开）

# --- 训练 ---
train:
  epochs: 100                    # 训练轮数
  batch_size: 8                  # RTX 4060 8G 显存，batch=8 很安全
  lr: 0.001                      # 学习率（Adam 默认）
  lr_scheduler: "cosine"         # 学习率衰减策略: cosine / step
  weight_decay: 0.0001           # L2正则化
  save_every: 10                 # 每N个epoch保存checkpoint
  log_every: 50                  # 每N个batch打印一次loss

# --- 输出 ---
output:
  checkpoint_dir: "checkpoints"
  result_dir: "results"
  log_dir: "runs"                # TensorBoard 日志
